body:
  text: 師子奮迅城童女彌多羅尼第十灌頂之土相是自在起用無礙故名若實慧納受聖職名曰童女法名波若莊嚴法門也恭敬心者能求之念也好樂等者教頎之法也就所順中大乘者名總句求諸已下名曰別也就其別中初兩句明護小乘心次觀法二句明護煩惱心至三世已下七句明依心起行就其行中三世一句解了一句決定一句住無一句此四句明依心生解次不違一句決定一句住如一句此三句明依解興行滅一切妄想等一句是住如之差別也就自陳來意中亦有三問三答初明其體次顯其名境界者用也就其用中約唯總別二門謂普門是總所謂佛剎已下名別就此別中有一百一十七陀羅尼就此一百一十七中初之八門明信法差別次功德陀羅尼已下十門明自行方便法三從業陀羅尼已下有三十八門明利他方便法四從無礙實際陀羅尼已下有六門明自行成就法五從世門法陀羅尼已下有十八門明利他成就法六從分別佛身陀羅尼已下有三十七門明自他行極大用自在無礙之義也心如虗空者總也餘句別也謂入深一句安住二句具足三句智慧四句得無礙五句住無礙六句善能七句行世間八句善巧九句於一切時十句敢此十句中初明解方便第二句行方便次四句明解成就末後四句明行成就救度國比丘善現第十一自此已下是第二大段明因漸行成故堪為知識就此段中初十位明自分行成故堪為知識第二十階明他分方便行成故堪為知識凡自分者正是十行之一位也歡喜行之淨土堪能濟物名曰救度出則以物濟世名曰善現法名隨順菩薩莊嚴法門也正念思惟者名曰總句餘十一句名曰別也地者猶地法也行者心行心流者心行從緣用在非一也用而外照名曰智光光之所照名曰性也語法者明光照法性故則成外業之用也圓滿者正報法也無間者依報法也出家日近者蓋是十行之初故也就不知法中初三句明法身體相用次具妙三句明報身體相用真金六句明應身體相用也輸那國童子名釋天主第十二戒行清淨離此塵相名曰釋天主土名義未詳其致也法名黶子算印此外論為所求也文殊教我者明此三法皆是波若之別門此即法體也我因已下明一法一切法即是相也善男子已下明於用也菩薩算數者明出世數法也知沙等者廣明用相也海住國優婆夷名自在第十三無慧之土寬而不動名海住忍欲結已緣所不壞名曰自在法名無盡功德藏莊嚴法門故以一食之施能飽及於塵衆也直心一句彌廣二句笇數三句淨法四句智慧五句分別六句於三七句出生八句得大九句斷三十句此正是依心生解乃至成行也日能生長月則除熱山便高而集衆海則寬而容寶蓋以知識具此德故故須廣求如海吞流也龍王者況於樂友受教心成大寶山者明教能生寶故須愛也次以善已下明知識之教有利他之用也此皆就教故異前吞流也菩提心者總也餘之十四名曰別也害敵兩心明無瞋也慳幻諂貪此之四句明無貪也瞋怠無平四心差別明無癡也餘之四心明三毒既除即成行亦備也慈者涅槃心益者除暴心無求欲者戒行究竟也若直對貪瞋有方便畢竟四門以説者則義亦無嫌也就二十八同中初句是總餘者名別又就別中初之九同辨於同因次境界已下十三句明同體亦極就同體中初之六同論於解具次精進七同就行以彰同體又此二門各有方便成熟二門之別也次同清淨業不違已下五同明三業自在以成同果也功德藏者總也如隨意已下別也就其別中一令物發願二除苦次四句能令衆生解行兩成集亦斯斷也大興城長者甘露頂第十四精進之土熾燃無崖名曰大興城進退合儀名曰長者無盡之旨納在心首名甘露頂法名如意藏功德法門思惟故觀察觀故往趣趣故能登登故攝受攝故能盡盡故度竟度故清淨清淨故遍觀遍觀故心從法轉心從法轉故一顯常顯成教證兩智就到淨土境界中初明周遍推求長者法身次樂求已下廣明推求之行廣明中初二句明樂求之心由習而生二於善知識已下七句廣明所生行相不同三雖不由他已下九句明於善財知行出自本而相從始發故須習近也九句者不由一句淨修二增長三成就四滿足五大悲六一切智七普賢八如來九也師子重閣城長者法寶周羅第十五離癡亂之土決定勝出名師子重閣定合深旨名曰法寶長者之名不異前釋法名滿足大願也九功德藏者亦唯總別之二門也開彼者法來從心也觀彼者即心而成照也圓淨者有垢皆盡攝彼者契成已用出生者一用一切用然此長者正以體寂真定淨土為家故乃其中有十重之法門也此猶似八未曾有之別義回向三處者謂除貧一見佛菩薩二聞法三也不可壞法身者菩薩法身也法雲者口業差別也實利根國普門城長者普眼妙香第十六善現之土徹窮本性名實利根緣無不攝名普門城真戒以資慧眼名普眼妙香法名令一切衆生歡喜普門法門也就長者答中初寄除物病明攝生戒具二我又善知已下托和香供養顯善戒亦集就前句中初明識病以處治二除其已下明將養合儀三我以如是已下明療功周畢妙稱物情也就攝善法戒中初辨香相二燒此已下明因香以成順行也一丸者明少尚曠周多則宜然也滿幢城滿足王第十七不著之土勝出方便名滿幢城無著自在名滿足王法名幻化法門喜樂二心初地淨者二地滅者三地廣與莊嚴二心四地也無著等三五地也見諸一心六地也自在者七地順法二心八地也見等三心十地也調伏者折伏也教化者愛語説法也愍念者悲心也度者行教也善光城大光王第十八尊重之土照無不朗名善光照勝於前目曰大光王法名大慈幢行三昧就知識答中初則指出法體并顯得之始終二從善男子我住此行已下泛明三昧用相差別三從善男子且待已下對事交現以顯用相不虗之義就前泛明中初明令物起趣道方便心二我以如是已下明此三昧能令衆生正行成立三此城衆生已下明真道究竟隨見不同四此城衆生已下結益歸本謂三昧故然安住城不動優婆夷第十九善法之土劫所不遷名曰安住智力自在魔不能制名曰不動優婆夷法名無壞法門就第二進涉修途中初明標心居定二爾時善財已下正明進行之相三如是悲心念時已下明善財心至仰感聖接不惓之義四爾時善財從智慧已下明於善財既蒙聖接則進行前路究竟之義就第二善財進行中初六思惟明奉教不違二從作是思惟已下九心明得法除慢成潤益之義三復作是念已下七句明發悟緣生知見善友成益之義四從念善知識已下十念明知識事要交益不虗之義七句者出生一起菩薩二出生三見佛四分別五出生六長養七若直就出生以為三句者則義亦無嫌就十念中初五明方便行次現一切智已下五句明正道益相就自陳來意中初一問答明於法體二境界云何兩問答明於用也此兩問答者一直請令説用在甚深第二問答明用雖甚深請其承力就因喻以説就因喻答中初明見佛為起心之由二從善男子已下明勝境現前起樂心方便三善男子時彼如來已下明如來知機授之以法四善男子我於爾時已下明順教修行得法之義五我發此心已下明得法行成展轉相續過無不盡義六善男子我初發心來已下明過相既盡遂勝入佛境德無不備七善男子我入此無壞已下正喚善財交現大用不虗之義就此第七句中一問定前情二隨情廣現三汝見此不者明審見虗實也不可稱國知足城出家外道名隨順一切衆生第二十真實之土一分滿足妙息名詮名不可稱寂相無求名知足城依空起用塵所不辱名出家外道機無不稱名隨順一切衆生法名至一切處法門就外道答中初答名以顯體二無依無作已下廣辨用相三此知足城已下明用無用相故乃衆生莫知是誰也既言用無用相則邪無不盡故特對邪見以明也悉得分別一切衆生三昧者明前分身由定而生也出生者正明分身遍在諸趣也其有見者明現而成益也長養者總明益相住一切劫已下別明益也謂一者起願二者成行三不著一句隨順一句名曰解也具足一句明於德也甘露味國長者青蓮花香第二十一自此已下是第二勝進方便行當應是十回向之別義也救護一切衆生令人樂見道無不被故就甘露味國及其香花以辨其相法名一切諸香也善財進行中初六句明厭世心成次常樂兩句明濟世心成次供養一句明信心行相次真實一句明十住行相欲得一句十行行相滿足者回向行相於一切劫一句十地行相詣一切佛一句佛盡行相入一菩薩二句普賢行相悉聞兩句明性起行相向無上道者猶是念當得也次志求五句念佛法也次欲淨五句明念佛行也就知識答中初明香體相別不同二彼香生起已下明成香根本亦皆備達就此句中初則總知原起成香所由次人中已下別就報位明於因別及以用相優劣不同也不善習氣者蓋明離誤心煩惱真戒之香也此即總也五欲一除煩二降伏三斷一四離三五此即除三鄣之差別也無染著者猶成前慧香之句也具足已下明戒香具足也故此文中句雖有十總唯解行香也樓閣城海師名自在第二十二法名大悲幢淨行法門蓋以不壞之行勝出無染故名自在也不可壞乘者佛乘也離二已下正辨不壞之相也寂滅樂者住無樂也遠離者過凡故不壞也得菩薩等者明過凡所得也道者猶菩提莊嚴者福德也薩婆若浪者一切種智也成就等者一切智也就知識答中初則答名以顯法體二在此海邊已下廣明用相就此用中初明隨事興益若無不除二我知海中已下稱理實觀真化亦滿就初句中初明益相二善男子已下總結益相以示善財就真化之中判亦同此可樂城長者名無上勝第二十三法名成就至一切趣菩薩淨行莊嚴法門言至一切趣者猶是等諸佛回向之別名也慈悲一句潤澤二句離煩惱三句心不放逸四句拔不善五句精進六句修習七句慧光八句滿足九句充滿十句趣一切智十一句然此十一句中精進已下他分行也就答中初答名以顯法體二行等已下假徵以顯用也無依無作者略明法體相根真偽也諸神通者總句也普眼者天眼也知悟者天耳也神力者神足也具足者宿命也離諍者漏盡也廣長舌者他心通也分別等者三明也難忍國迦陵伽婆提城比丘尼名師子奮迅第二十四法名菩薩一切智底法門者猶是至一切處回向義也問答可解也國名嶮難城名寶莊嚴女人名婆須蜜多第二十五法名離欲實際清淨法門者即是五地捨妄會旨隨用清淨無盡功德藏義也就善財進習中大慧一句長養二句一心三句建立四句廣修五句為衆六句方便七句滿法八句明淨九句諸通十句究竟十一句次第差別相在可知也就問答中初問答明於法體及用相差別第二問答明得法原由及處所不同也答名者即是顯體也若天等者即是用也入安樂城者答於所問奉妙天冠者酬於修請也城名首婆波羅長者名安住第二十六法名不滅度際菩薩法門者蓋是隨順平等善根義也我開者明其相也境界者談於用也一念知三世總也念際等別也念者念成就劫者想成就隨順者慧成就淨莊嚴者智成就成就者行成就分別者道成就也光明山觀世音菩薩第二十七法名大悲法門者即是隨順等觀一切衆生義也住在西阿者欲明其人大悲內勳近茲永夜接化故也及諸佛法者十力等也法流者無生流也彼諸佛法及莊嚴等者報身差別也不思議業者應身也是如來者即是佛也法雲者即法師也功德者行教益時也十力者得果也次難見難過已下四句明其知識能生正道真益是故難遇也就其答中成就大悲法門者答名以顯體二教化已下明其大悲隨化之相三善男子我行已下明其大悲益利差別也就其益中初除此世苦二復次已下除他世苦也十八恐怖者猶是十八怖畏也就此十八中初五怖畏者皆是煩惱畏中之差別也貧窮不活諍訟畏者不活中差別也大衆可知生死等三者惡道之別也不同等三者惡業畏也次身心等三者總明前畏其唯身心兩門也嶮道者當似賊難等嶮非同五道之嶮也普賢者總也餘之八流名曰別也善根者戒也劫者慧也成敗等者利他行也除生死者令物滅苦也菩薩行者不住道也然此諸行皆是展轉相續能泛行者終到大果故名流也東方菩薩名正趣來詣此金剛山頂第二十八法名菩薩普門速行法門者此即如相回向之真義也實以此門深證無生妙合先際故言東方來入此會也又此一行迹是空門明相殄息故及善財更無南遊之事也普於十方者總清淨等者別也清淨一句分別二句滿一三句順一切法四句等觀三世五句説平等六句不著七句無著無礙八句然此八中初二句法身也次三句應身也此即身業之相也説平等者口業也不著兩句意也城名婆羅婆提天名大天第二十九法名雲網法門者即是無著解脫不住道義也正念一句一向二句出生三句精進四句得不五句決定六句三昧七句陀羅八句大願九句諸辨十句諸力十一句也四無礙智演説無窮名曰長臂説成究竟名以水洗面也閻浮提內摩竭提國有道場神名安住第三十法名不可壞藏法門者即是法界無量天真常住出生之義也實以此行迹參證位明相漸息故乃方中更無南東之號又復行熟將入佛家故在閻浮提摩竭國也閻浮提內城名迦毗羅婆有夜天名婆婆婆陀第三十一自此已下有十二階明教修成就行成故堪為知識就此十二階中初十階明菩薩行因滿足次摩耶一人明菩薩行體亦集末慈氏一人明行果究竟前十階者即是十地之別名也然此地德皆是體證無漏自在無礙返迹重昏塵所不辱儀相是於故此十階之知識皆以夜天為名既言無漏則是入佛境界不離本處理在決定故所住處皆在閻浮及摩竭不遠等也法名成就菩薩光明普照諸法壞散衆生愚癡法門者即是初地智慧之自在也就夜天答初問中初問中初則顯其問合二我已成就已下正答已證法體差別三善男子我於惡衆生已下廣明已證行相不同就此廣明行相中初長行後偈頌就長行中初明大慈與樂二善男子我常如是思惟已下明拔水陸暗溺之苦三我為一切衆生已下明能化物除結斷集四若有衆生迷於十方已下明濟以道益五善男子我見貧苦已下謂能令衆生尅滅滿足若總而束之則初之三句明慈悲具足成光明之用餘之二門明化衆生修道剋滅成壞敬之能也就重頌二十一偈中初五偈勸修四無量餘十六偈勸修六根及與通明成法身淨報除苦剋滅以出長夜之滯也次第二問又近者蓋明初地已上真寂緣起妙出始終故偏有此問不同前三十之知識也就答中初明過去久修先際行立以答發心之早晚二善男子爾時玉女豈異人乎已下明會通更修彰後際德備以酬得法之時節既能二際之行具攝在己則便古今平等妙出始終成無之久無近之近自在畢竟也自下知識久近之義例如此判若明成行之位階降之相以釋者則義亦無嫌也我唯知此已下彰高推有在次善財以偈讚嘆者明解順虗宗自幸利深仰讚供養酬恩故也此亦彰得法之淺深獲利之階降然矣就讚辭十偈中初四偈明彼夜天報身圓滿三業清淨次三偈明三業自在説無窮以彰極妙也閻浮提內有摩竭國有夜天名甚深妙德第三十二法名成就菩薩寂滅定樂精進法門者即是二地進修之始相也就設敬既周自陳來意中但有一問一答略無久近之問實以此位相是修道之初行淺非深故也就初答中初則顯前問合二善男子菩薩成就十法已下正酬其問就此正酬其問中初則泛舉十法勸令修行二善男子我已成就已下正明夜天説所證以答善財就十法中初五句明定慧行成見於如來體相用益五身之別大光明海度脫衆生者亦是益中之義也次一一毛孔已下五門明見佛行成三業自在化用之法門也就説己所證以答善財中初明澄心真定境無不現二善男子我如是了知已下明定心既淨則靜無不順通無不備之義三善男子我如是修習已下明定德既備遂善巧方便返迹塵中隨機廣化緣無不益義就更示高位中亦一長行二偈頌就重頌十三偈中初一偈總明定行自在能見於佛次十一偈明所見之佛德相差別末後一偈頌前高推有在就德相中初三偈明三業為佛體餘八偈明三業無礙利益無窮若通頌前答者則義亦無嫌也去此不遠如來右面有夜天名善目觀察衆生第三十三法名正受普光喜幢法門者即是三地定行之別名也就第二順教修行中初明辭退標心居定二爾時已下正明順教修行之相三爾時善財法詣已下明順教行成達到之義就第二順教修行中初善財起自力方便二時喜目已下明善財得他力方便三爾時善財即時已下明自他兩力既具則攝成己用成行之義也就第五自陳來意中有三問答初一問答者明息亂歸定具無問之問無答之答故乃善財見彼即當問也正受菩薩普光三昧即是其答此亦即是見淨土法身之兩義也就此答中初明定體次一切毛已下明於定用就此用中初明定出十度成利他之行二顯現喜目已下明自利行德亦唯十度三出無量身雲已下明自他行成能興供養順佛之義四從為一切衆生現喜目已下明攝成己德見佛不捨以成化益之義五彼一一身雲已下明時衆獲利顯其夜天説法不虗之義六爾時善財童子皆得見用如上已下明其善財聞法成行荷恩以仰讚就讚辭中初六偈明其夜天應法及報三身具足自在無礙以成知識之行次四偈明三身既具能出天雲供養諸佛普賢行備故成知識也就第二答中初九十八偈半明始修方便次偈後長行明會通今古顯終行亦備就九十八偈半中初二十五偈答發心之請就此答發心中初七偈明過去發心受身處所次我時已下十二偈明報身清淨夜感奇夢次我時覺大王已下六偈正明因夢向佛成發心之義二從是已下七十三偈半答於第二幾時之問就中初五十佛明地前方便次有十佛明見道行立謂八正是也餘之四十佛明託之供養得無生法忍末後二偈結成究竟然此三地者是世間行終得無漏光明故乃還寄久近之問以邪行成之畢竟也於此衆中主夜天名妙德救護衆生第三十四法名教化一切衆生世間法門者即是四地之別名也就設敬既周自陳來意中初一問一答明於法體二爾時善財偈讚已下有三問答明於法名及證之早晚并得證之方就初問答中蓋有答文而無問辭謂詣夜天所者即是問也就答中初明為現三昧顯無説説二爾時善財即得已下明於善財以無問問證入前境攝成己行三爾時善財見彼夜天已下明於善財慶己所得禮拜仰觀四爾時夜天已下明於夜天顯化事周攝用歸本之義五爾時善財已下明於善財偈讚以美其德就第二證入前境中初明攝法成定次得此三時已下明定成有用就此用中初明器世間相如是等一切世界已下是衆生世間相滿大願力故已下明智正覺世間相就器世間中初明知塵即世間體也次如是等已下明於知界即世間相也三悉見五已下明於知道即世間用也彼諸等者猶道中差別也就衆生世間中初則牒前界趣為現身之所二見彼夜天已下明於夜天隨處現身三為地獄已下明現身除苦成益之相就此成答中謂初化五道以成益又復已下明濟三界以生利也為欲界者蓋簡龍居人以邪人道守界義強故也故為人也一畏中初一是總餘者名別次如是已下明總別兩門畏無不攝也就別明畏中初六畏明信中有礙次失菩提心已下四畏明住中有失三生死畏已下八畏明行中有損四諸貪已下兩畏明回向有妨就智正覺十七句中初十一句明自分智相次在一切佛已下六句明他分智相又此二中各光明自利後説利他悲者利他也心海者利他也就二十偈半中初十二偈半嘆於夜天三業德備次八偈慶已所成三種世間行成自在以顯知識之德備也就第二問答中亦初問後答名為何等者問其法名之如者請得證早晚修行何者咨於顯證之具所以興此問者蓋欲自長神心同證無二故也就答中有長行及偈就長行中初明法深平等妙息名答次諦聽已下明率己智力就因喻以廣酬前妙息名答中初此處甚深者是總次一切已下是別就此別中初對下人不證以顯其深二何以故已下據上人能知以成深義就上人所知中初四句明此深法是他利大人之境界次一切佛剎四句明此深法是自利大人之所安心也就廣酬中初則答前二問二從善男子我已莊嚴具已下明以事佛善根為得理方便答于第三何行同也就答前二問中初則酬於法名次時彼女人已下答第二問三則會通也就前答名中初出世界差別明妙德幢修行成佛度人因緣二爾時普賢已下明普賢助化令息慢平等得法名之義就前世界差別妙德佛度人因緣中初則略明聽説之義次往古已下正明説相就此説相中初説時節世界差別之相次時彼城中已下明於輪王出世為佛施主之義三時彼城北已下正明如來出現世間度人之義就此如來出現世間度人之中初明淨土光現二最初妙德幢佛已下明法身隨出度生之義就此段中初明妙德尊號備建二為化衆生已下十二句明於如來放光名緣三爾時衆生已下明有緣皆集四爾時妙德幢已下正明如來隨機説法度人之義也就第二召集有緣中初明放光次滿七日已下明於動地就放光中初十二句別明放光次佛子已下總結前光成益之義十放光者即是十句又七日為一句次稱情為一句故乃先後句有十二也滿七日者謂七日之中放此十二光也就有緣皆集中初明從衆見淨土以赴道場次一切金剛已下明向佛心淨事成道用謂成身口與意三業供養也若言觀佛精成瑞相先現者則義亦無嫌也菩薩者即衆生世間也就第四隨機説法中初明如來稱根授藥次令無量已下二十句明授如成益三何以故已下釋成能益義就二十句中初兩句明人天行相次一句明二乘行相次十七句明大乘行相然凡夫善弱理無自固故乃文中闕無立號小大兩門體是無漏緣所不壞故乃文中並安立稱也就大乘行相十七句中初四句明於信相次平等三句明於住相次方便三句明於行相次菩提心三句明於回向次無量衆四句明十地行相就第二普賢助化中初明普賢隨機顯化二時彼衆生見已下明機隨化轉除慢之義妙身者身業化也大王當知者口業化也即是神通相粗唯被下從口業是妙化兼上哲也就第二機隨化轉中初明下情尋伏次時彼聖王已下明上哲嚮順就此嚮順中初明王升虗空告及兆民次爾時已下正明輪王共衆趣佛成離慢方便三爾時妙德眼女已下明方便行成入佛境界除慢究竟得法之義就告及兆民十偈中初一偈舉佛德勝出勸衆疾往二無量一偈明聖出甚希故須速往三普見三偈明於如來心行殊勝故須速往次無量四偈明於如來益世不空故須疾往五各辨一偈正教大衆各辨所賫發於勝心為疾往之儀就第三除慢究竟之義中初明妙德以已上珍仰事如來次於虗空中已下明奉心純淨事轉更妙三於其蓋中已下明更妙故圓淨真土境現心目四爾時妙德幢佛已下正明見佛聞法除慢究竟得法名之義就淨土門中初明同體淨次又見彼一一已下明自在淨相三時彼女人已下相見而成益也盧舍那者上首功德也劫者劫世界也一一者總明自在也種種已下二十句別明也此亦相同十世界海也就第四見佛聞法中初明見佛説經次時彼女人已下明聞法得定三復得三昧心已下有三十四心明得定故心淨四如是等心已下明心淨故證法自在五出普賢已下明證法故普賢行成就得定中初則總明得定顯教並利益之相次所謂已下有十二三昧別明定相次得如是已下明結歸前數就十二門中初五自利次七利他就心淨中初八心明智方便心次一切無著已下七心明斷方便心如來等者斷貪之始愛念等者除瞋之始三無疲倦已下六心明依前智心成自利行也四分別一切已下六心明依前斷心成利他行也五向佛已下七心明自他淳熟成佛盡行相故自在法門之中亦有總別及結三句之別也我為夜天等十種受生者蓋明夜天倒説地前得方力故雖徑六道種性不壞見佛聞法而無暫廢也就重頌三十八偈半中初一偈頌前法深絶名之義餘三十七偈半廣頌因喻就中有一百一十佛者蓋欲自明彼諸佛廣興供養行成建立自在之義於此道場去我不遠夜天名寂靜音第三十五法名菩薩無量歡喜莊嚴法門者即是五地難勝之法也就設敬既周自陳來意中初一問答明略説顯體門二此法門者已下明廣説顯相門三為久如已下一問答明體相融同妙出隱顯始終平等義就立相四門中一問所作者問其力用二境界云何者問會境界之分齊三何等方便者問得境之解四為何等行者問成解之行也就答為何所作中初則就己智力説法度人以顯法門力用之相二善男子我以如是等已下明言義既周結皈化門以成稱機歡喜法門之用義也就前段中初明令物修法身之行二為貧窮者已下明其化物成淨土之行就法身行中初九心者明於化人成信地之行二善男子我為衆生已下明十波羅蜜成正行之義色聲等者令物離著成布施之行若見在家等者明令物離過成戒度之行清淨色等者猶百三十不共法即是佛盡之行相也清淨藏等者猶是蓮華藏淨土之名別也為貪欲等已下正明化物修淨土因行之相就答第二境界問中初一句觀菩薩功德因行法門次又善男子已下十句明觀諸佛功德果行法門三起者非起已下明境出自中非從外來以成真觀之義四佛子已下明言義既畢結酬前問之義就菩薩功德中初明境別不同次我見已下明境成心用調柔清淨之義下觀佛功德例同此判就前境界差別中初總後別就其別中初十八句明觀上首功德次種種諸大衆已下明觀著屬功德就前上首中初七句明法身功德次妙莊嚴已下十一句明報身功德又此二中各有三業之別諸道者意業也超度等者意業也夫論佛身其唯色光及雲三相之別此即三身之殊義也以成真觀中起者一句明智從內現也得等六句明境非外來也何以故已下舉法非事釋前心境非外之義也非入者非香也非度者非法也非漏者非味也次佛子此法門者無量無邊已下是答第三問相蓋顯法相雖深可奇因喻以陳故名曰方便若以善巧相成名曰方便者則義亦無嫌故此答中初之九句明法門天真詮所不及次此法門者非生一切諸法已下有二十二門正明就喻顯説被時成方便之義三如此諸喻已下略明法喻相顯以成方便之相也究竟方便者猶此法善巧成也此即九中之總句餘八句者謂一真二常三深四廣五堅六遍七則統攝八則最上而無二也就二十二門中初三門明自利方便法次大地五門明利他方便法三須彌三門明自利行成法四慶雲七句明利他行成法也五樹王五句明自他無礙佛盡之法也次爾時善財已下答第四問也就此答中初則直明十行二菩薩已下明將行顯真成起具之義就前直明十法中復有舉辨與結三句之義也夫言起得淨成者猶似聞思修證也就答久近中初長行後偈頌就長行中亦初明時節二辨世界三論施主四明佛出五明值佛發心之義就此第五值佛發心中初明遇佛高發勝心為受法之本次彼道場上已下廣明見佛聞法長養心清淨之義三善男子已下明命機結酬勸修之義就第二廣明見佛中初説往劫聞法次第次於彼佛剎已下論於此劫得法先後就説往劫中初九佛別明見佛得法次佛子已下牒前顯後顯受生交回報無定據而恆見佛聞法長道心而不廢也就論此劫中初則牒前顯後面奉三佛為證法方便次見盧舍那已下明方便既熟妙窮法界自在無礙也就此段中初明見佛次復得已下明於得法三得法門已下明得法故成勝用方便廣受大法起行之義就此勝用方便中初明於十方佛所聽受正法次又見盧舍那已下明於此方真身佛所聽受正法三又復見彼已下明於此方化身佛所聽受正法四出生已下明受法行成智用自在五得圓滿智地已下明宿命智具妙窮佛境六於念念中已下總明宿智知佛始終究竟之義明智者修慧也觀察者證慧也就第四智用自在中初一句總明智用次於一一已下十一句別明用相就別明中初兩句明聞慧之用次攝取三句思慧之用次逮得三句明修慧之用次見一切佛三句明證智之用就第五宿命通中初則總明通體次知無量已下別明通相就此別明中初六句明知佛行謂初之一句明知本則攝五也願則略無故乃文中唯有六句也次菩薩諸地已下八句明知諸佛地位階降三知無量佛為菩薩時出世佛剎海已下四句明知諸佛佛盡行相也就重頌十偈中初三偈觀於善財起修方便餘七偈頌已所行久近之義就更示高位中初明夜天自分誨周更推高德以示善財勝修之妙軌二爾時善財已下明其善財既蒙指授荷恩以仰讚就偈中初一偈明自幸業深來有所遇以五偈正嘆前德無相而相隨世以成化次四偈嘆其能説以法益我道場上如來衆中夜天名妙德守護諸城第三十六法名妙德自在音聲法門即是六地般若真筌之教法也就設敬既周自陳來意中初問答明入證之儀第二問答明證無證相妙出始終就答諸問中初則嘆其問合二善男子我已成就已下正答所問就正答中初則答以化教法門二法施已下明行教法門三我以十行已下答以道法四佛子我如是已下酬以德法門就初化教法門中初則總明化德次於一切法已下別明化德就此別明中初明護煩惱心次安住已下明深念心也得一切利已下明求一切智心也長養等者明師德成立也淨日者明智淨故成師也等心者明心淨故成師也斷一切者行淨故成師也就第二行教法門中初則總明行法以出生已下別明行法三佛子已下對機結酬益世之義也能專求者佛盡智也故答久近中初長行後偈頌就長行中謂始於初唱終於悉現在前已來明始起因行二豈異人乎已下明會通以顯終行此則舉始以成終故乃會通成在終門也就重頌十四偈中初二偈嘆法深以為心本餘十二偈頌因果二行也就善財荷恩仰讚夜天十四偈中初六偈明彼夜天自利利他二種方便心成之義次二偈明心既成立則師德具足次六偈明心淨無垢內照圓明師智亦具然此德智二門相並是用故乃文中皆以同佛為嘆辭也此佛衆中夜天名開敷樹華第三十七法門名無量歡喜知足光明法門者即是七地功用行極智照無礙也就設敬既周自陳來意中初一問答明無量法體第二問答明前體用託緣始終修成之義就答第二境界問中初就如來極果明此法門力用自在成益之相二從佛子我入已下正依已證以顯法力就初句中如來方便者正明佛力能益衆生若有等者明前品得利由於如來以顯聖力一切悉蒙者牒結以顯力義也就正依已證以顯法力中初則略明自己入此法故洞窮舍那本業因緣二善男子我知已下廣辨知相三佛子以如是等無量法已下結歸所明之旨四以如是等已下結入善巧大用自在同佛之義就第二廣辨知相中初知如來在於往過教化衆生起離著之心成地前方便二佛子盧舍那已下明佛前世化度群品令入證地正旨之義就前句中初明令物得離相實解除煩惱鄣二具足成就大慈已下謂令衆生解成行立斷於業礙三成就通力已下明以三輪廣化衆生剪滅報鄣苦礙之義教化成就一切已下口業也一切劫者意業也悉能遍遊已下明前三業無礙自在故能益物也分別名口業也於念念中者是意業隨智也就答久近中初明聽説分齊因果之義二從佛子往古已下正就因喻廣答其相岐此兩中各有長行及偈二周之別就前長行中初明法深難説難聞二乘不惻之二除佛神力已下明自他二力具足無缺方能説聞三何以故已下釋成難説難聞而復得説得聞之義難知是總餘五句是別就重頌二十一偈半中初五偈頌前總説就中初一偈頌前難知次四偈明出四心頌前五句別相之義次出生九偈頌自他二力具足無缺心如金剛故成説聞之義次了達五偈半正明法是佛智故乃難説難聞頌前何以故已下釋成之義次善財二偈正明審機來有所遭宜當勤修勿得懈怠以自失也就正答長行中亦初辨二會通就前辨相中初寄輪王明勝修行具二詫寶光明女明內行亦集資成於外三王施女衣已下明外資於內就前輪王中初出輪王國土因緣二明輪王對苦以修十悲三則修行大捨就出輪王國土因緣中初明時節及世界名號二明諸佛興世三辨世界相貌四明輪王御時澤沾兆庶五明世薄情浮衆苦普集聞及大王之義就明輪王對苦興悲中初則總明對苦悲無不集次即發已下明且隨化相略論十也所言十者一明無信之苦二明貪瞋之苦三明無常故苦四恐怖故苦五見疑故苦六無明故苦七邪命故苦八愛縛故苦九無目故苦十不調故苦夫此十中謂初之三句明欲求衆生次三句明有求衆生餘之四句明妄梵二求也就第三修行大捨中初則命及前田許施不違次即時已下明廣列所施相貌不同三時城東門已下明地處平正屬行施之所四時彼大王已下明王報清淨施主德備五爾時閻浮已下明衆田悉集六時王見已歡喜已下明良田既至喜不自勝七復次佛子已下明正對前田敬心離慢行施之義今施汝等者謂更列勝財故異於前也帝釋等者譬於樂勝孝子喻者邪於喜妙次何以故已下釋成喜妙謂由施故成此等行故須喜也入一切等者明功用行相入深等者明無功用行相就寶光明女讚辭五十二偈中蓋直頌王德具足圓滿亦不一一專頌上事就中初八偈頌王正報德具生能除災二往昔諸羣生已下十七偈明大王德備有所沾益故能除災以生物行三王父名淨光已下二十六偈明輪王德具能踵繼先王之業不墜之義末一偈明其天女自迷己懷有慶遭之美也淨飯王者猶大方便智也摩耶者猶大願力也夜天重頌十偈者蓋頌前所見往遇之事就中初二偈明天眼相具故有所見次二偈明天耳相故有所聞次五偈顯宿命相具故有所見末後一偈結已成頌勸修之義也於此道場有夜天名願勇光明守護衆生第三十八法名隨應化覺悟衆生長養善根者即是八地淨佛國土之教化也摩尼王網羅覆身者蓋顯報行具足故也就此報行具足十九身中初一具本餘者是末又就末中初六身就自分德備以明身具次詣諸佛已下五身據他分報滿以顯身相三除滅已下七身依自他兩分畢竟之德以辨身義就設敬既周自陳來意中初明設敬既周妙合無生得證滿足二爾時善財説偈已下寄問答之門廣顯得證之相也就前得證中初得十心者即是無生法忍第二得菩薩共法者即是勝行之差別也三明善財重頌慶己所遭更請攝護興報恩之義就第二勝行中初明善財觀彼夜天得微塵共法是即舉數顯體門二所謂已下列名已廣説三得如是等已下明辨相既周結成統攝無外之義就廣説八十四門中初二十二門明勝行之體次大慈共法已下終於不退智共法有四十七門明勝行之相進修差別三從受生共法已下竟此段有十五門明於勝行體相既具則大用自在無礙之義此亦是三時之別門也就前勝行體中初四門明自行方便次諸根共法已下六門明他利方便三清淨色自共法已下竟此段明自他緣起三業自在成用之義謂辨才共法已下是口業相也淨德共法已下意業相也就勝行相中初六門用利他方便心次詣一切佛共法已下三門明自利方便心三教化共法已下六門明利他方便行四深入共法已下五門明自利方便行五不退共法已下三門明利他行成六滿一切佛剎細已下九門明自利行成七方便共法已下竟此段明自他行極自在之義就此自在中謂自在是總餘句是別就其別中境界者法自在修行等者業自在安住等者心自在盡未來劫者願自在信者信自在長養等者猶智自在之別名也就第三勝行大用自在中初應化一句總明其用次住共法已下別明其用就別明中初二句明智無不集次無著二句明慧亦圓滿三容等三句明身業行成四陀羅尼兩句明口業亦備五深入兩句顯意業復建六明淨共法已下四句明三業隨智進止自在益世不虗之義就善財重頌中初三偈頌前十心及于共法得成行之義次二偈仰求更釋次四偈明更釋有益故須求也末一偈結知識恩深報在無窮之義就第二段中一何等者問其名二發道心者問其因三久如者問景行也問既有三則答之節數義亦同矣就答初問中初言此法門者正答法名二善男子我入此已下廣明法門力用之相就此廣顯中初明法出生滅無色可色二而能顯現無量諸色已下正明體雖非色然其隨化則無色不色以成覺悟長養之義也非一異者猶本末無礙也就無色非色中初一句總説二所謂已下廣辨其相應有百句之別義三佛子我住此已下明結成在我用無不備也就百句中初二十句明自利行體二隨應現前色已下六句明利他行體三非比非無比已下十四句明自利行修四令一切衆生已下十三句明利他行修五從寂靜色已下十六句明自利行用六從悅衆生眼色已下十六句明利他行用七從放一切光明色已下明普賢身色建立滿足自他無礙八於念念中已下明大用自在像無不現也就答第二問中初則略明聽説取捨之義二從佛子乃往古已下明廣就因喻辨於得法早晚之義就前略明中初明久近難説勸衆令捨以佛子已下明説在於粗勸衆令取就前勸衆令捨中初一喻明理無久近而從緣離妄故有久近第二喻者明從緣久近即非久近如似日現而無現相也此之兩理皆就日為況明教智具足超出自本滅發之義三海喻者明三際平等證非外來妙絶始顯之義四虗空喻者明成壞自彼五化人喻者明憂喜非我此等二喻明不住真道成由理出故乃寂滅於久近也若言一者去無去相二者來無來相三者度無度相四者持無持相五者有無有相者則義亦通矣就第二廣説門中初託受報次第明於往世起行次第得法時節及發心久近之相二爾時太子豈異人乎已下明會通更修長養前心轉勝之義三明重頌就此重頌三十六偈中初一偈略明聽説之義次十八偈正頌受報起行得法時節也三一切諸導師已下頌於會通更修之義成佛之問略無別答實以此經所明修行隨所分證皆成大覺故乃文中更無譡譡之酬答也此閻浮提有薗林名流彌尼有夜無名妙德圓滿三十九法名受生自在法門者即是第九善慧捨於八地五生自在終共法雲成正覺之別義也又從八地入於九地相在稍難故復更須漸漸遊行也就設敬既周自陳來意中初問答明受生行體次第二問答明受生之行力用分齊第三問答明行成久近就答初問中初總舉十數略歎功能二何等為十已下假徵以列名三何等為供養一切佛已下一一廣説四住是菩薩已下就人總結以明功用之義五時彼林天已下重頌六偈後少文結也就十門中初供養一句總餘九是別就別中一發心二觀察寂滅三直心四普照一切藏此之四句明先際行立餘生佛家一光明力二薩婆若三法界教化四精進五此之五行顯後際行備夫論廣説者各既有十則文亦同爾就辦供養中復有徵辨與結三句之殊下九例同就初辨相中初明利養供養無量者明香花供養積集者明修行供養自下辨相中句數增減亦義在無定也就辨發心中初則總明發心次起大悲已下十心別明心相三如是等已下總結前心成受生之義悲者利他方便值遇者自利方便大悲者利他心成離諂曲者自利心成發大願者自他淳熟也就辨觀察九心中法海者解心法門也不疲等者戒行法門也出生者慧行法門也普賢已下明畢竟法門也就辨直心中直心一句深入一句深心三句皆一切四句何一切五句趣諸六句離垢七句長養八句散懷九句悉為十句也次第可知就辨普照一切中初則總明方便緣無不照次貧已下十句正明前緣行相差別謂十度是也就生佛家辨相中生諸一句同三世二句同諸善根三句同諸佛法四句遠離五句長養六句得佛七句隨所八句不捨大願九句聞法十句也就光明力辨相中深入一句遍遊二句供養三句無疲四句知一切五句成就六句知一切七句知一切佛八句悉究竟説一句法九句也就薩婆若辨相中童子身一句於無量二句究竟三句入不可壞四句得非境界五句於無量中六句知諸世界七句分別一切八句也就法界教化辨相中佛剎一句究竟二句悉行三句應受四句善能五句淨智慧六句也就精進辨相中灌頂一句一切世界二句悉地三句修菩薩行四句知諸衆生五句知三世六句知法次第七句知一切劫八句隨應九句次第轉正法輪十句也莊嚴者身業也轉法輪者口業也住諸法門者意業也就重頌十偈中初一偈頌供養第二偈頌發心第三偈頌觀察第四偈頌直心第五偈頌普照一切藏第六偈頌如生如來家第七偈頌光明力第八偈頌薩婆若第九偈頌法界化第十偈頌勇猛就答第二門問中初明夜天自引己生以顯當來菩薩生之力用有十種瑞相二佛子摩耶夫人已下就現在受生以顯瑞相三佛子我一念已下結德屬己以顯己德自在無礙也就摩耶夫人中初舉十光明召集有緣二從佛子於此林中已下正明受生之時自在無礙以顯受生法門力用之義三從佛子摩耶夫人生菩薩時已下正明夫人生菩薩時顯現炳然而無生相之相義四從佛子我一念已下明夜天自説一知一切知自在之義就第二受生之時自在無礙中初則就處總舉受生自在之數次何等已下假徵以廣説就此廣説中初一明外有所集第二明內有所容次三四五六明身有所現次七八及九明身有所出第十一門明報有所感謂淨土琳琅昞著目前也就所現中謂初顯菩薩供養諸佛聽聞正法次城邑等者明依聞起行次其身等者明行已得報次布施等者明報既具足則果亦清淨也就答第三問中初長行後偈頌就長行中初辨隨緣受生起行之相二會通以顯更備也就重頌中有二十三偈半還頌前事初一偈略明聽説之儀以九偈半頌前起行次第次十二偈頌會通之文末一偈結顯無窮義也迦毗羅城有釋迦女名瞿夷四十法名遊生死中者猶是薗林遊戲門此即法雲之德自在之別義也就此知識中初明辭退有所趣向二正念已下明順法修行正趣高人三升堂已周遍推求已下明行不虗行得矚尊顏四從爾時善財五體頭地已下明到已設敬五從禮已合掌已下明設敬既周正陳來意六則更推有在文顯可知也就第二順法修行正趣高人中初明善財念法以進趣二爾時彼天已下明離憂妙德天為不請之友助顯瞿夷來迎善財令進修方便不倦之義善財答言已下明其善財蒙眷心暢略陳已壞以為進趣之行也四爾時善財將升法堂已下明其善財進趣行成為妙德大天散花説偈供養之義就十偈中初二偈明善財人勝故難遇次三偈明人勝由於心妙次二偈明心淨故成行次譬如三偈明行成故大夫志立見佛不久五偈後俱升法堂者明內外相資同證無差也就第五正陳來意中初一問答明行體第二問答邪法之力用第三問答明行成德位階降之義就答初問中一長行二偈頌三結歸所宗謂一切菩薩法海法門也就長行中一嘆其問合誡聽以許説二善男子已下正説就正説中初十句明普賢行集次十句明習近之方謂行成由於友立就普賢行中一舉數以顯無礙二辨相三是為已下結成無礙之義就重頌十三偈中初依善知識一行有兩偈頌第十遠離生死有三偈頌中問八行各有一偈故有十三也一念皆能詣者頌心常樂住也就答第二問中初明入法成智無法不知二何以故已下舉理釋成明法力故然也就初句中初明知此世間自土之法二如此娑婆已下明知境無邊謂他國之法就知自土法中初知有為法二彼諸劫中已下知無為法三知彼眷屬諸菩薩已下明自體緣起法就此自體緣起中初發心者十住法成就等者十行法種種等者回向法也諸地等者十地法也圓滿等者是地果之別義也就地體中自在者是總句餘者是別句攝智等者利他行諸住者自他不二也自在行等者攝報果也修習行者願智果也就答第三問中初明隨處受身起行之相二爾時太子豈異人乎已下明會通不二三彼佛滅後已下明見佛聞法更起勝修方便成普賢之行四佛子我唯知此已下明自知己心知法分齊五重頌就前段中初明一切寶主王在家果備生好太子納於勝妻共見如來成信心方便義二時彼太子與諸眷屬禮彼如來已下明太子生信化及太王令修出家果使太子升位得廣修福行之義就太子納妻中初明因其入薗迭相召問為進修方便二彼女人聞是已下正明太子與女婚姻禮備相資無二之義三爾時太子聞彼如來已下正明夫妻相資行成見佛聞法悟道之義就婚姻禮備相資無二中初十偈明女自陳情嘆述太子求納之義次十一偈明太子問女能生定屬更立道契以顯自己不直在情而已次二十四偈明女母代陳頌於己女從生福果報并陳女之志行顯堪為妻婦義在無疑蓋能知女者唯母故也四爾時太子答言善哉已下明取心雖定宜更陳道節以顯先難後易次七偈半重頌前義更無別也五時女答言已下十四偈明女自申心顯所求處大小苦甘受不違之義也就第三見佛聞法中初明太子聞佛出世以衣與妻欲顯將行之義二時彼女母已下十偈明女母見太子分衣與女欲共去見佛乃自陳己心娉女得處願畢之義三時彼太子已下正明進路見佛聞法得益之相也就重頌中初一偈頌善財德妙故欲攝取次二十偈頌前受報起行因緣次十一偈頌見佛聞法起勝修方便成普賢行義末一偈頌前仰推會通之文無別頌也此迦毗羅城摩耶夫人四十一此一知識明菩薩行體蓋寄摩耶夫人大幻自在妙慧平等證教兩智以為菩薩十地之體實而教證兩智生佛之功義在無缺故乃持就摩耶佛母以顯就此文中初明辭退二作如是念已下退已進行三爾時善財答羅剎已下明行成故得見知識四爾時見摩耶夫人有如是等已下明見已設敬五白言大聖已下明自陳來意以顯大幻之法門六則高推有在就退己進行中初作如是念者明惆量見人聞法之方二寶眼天已下明聖人嚮化不違前念之義就初見人聞法之方中初明善財心懷進退興難遇之念二從善知識者已下正明知識法身清淨難見之相三如是等已下牒前真身明見唯普賢顯己智弱見在不易之義凡真身而言略有十九謂初之四身正明法界緣起成真身之義二非生滅已下四身明身非無常是故真也三一切諸相已下三身明身非情相是故真也四無窮盡已下四身明非無常故則與後際等住出於情見五如淨日已下四身明身非情相故而無相不相以成身也善業化者報身也持佛者應身也如意者應之別用也生滅猶始終來去猶往還虗實猶真偽聚散者離合之別名也就聖人嚮化中初託寶眼明見理分明心因具足二法妙德天明依心生解三善眼羅剎者顯依解成行此三具足則見反之行具也若就斷除三鄣以辨其相者則義亦通矣就前心因中有二十四城初二城明護煩惱護小乘心因具足次九城明依前心因修起十度先後二際自利之行次廣心九城明自利既樹則他利亦備次心城自在力已下四城明自他無礙就依解興行中初之十門明戒行具足謂直心者正是戒行之別名次十法明依戒成宗三昧是也就第三行成故見知識中初則答前善説更請所行二答言已下正明羅剎略酬真空以顯去道三爾時善財隨順其教已下明順旨解成得有所見凡言去道者義在前境故異於前行者也夫論所見其唯淨土之與法身二門之別也若據三種世間已明所見者則義亦無嫌謂爾時善財見如是等種種色見已下是智正覺世間也就衆生間世中初則舉前依報以顯正報圓滿之義次具淨色身已下廣明正報身相差別三爾時善財見摩那夫人已下總牒前身明於隨用非一之義也就前第二身相差別中初則隨行差別廣明身相有五十不同二如是色非色已下總攝前身明要唯五陰更無別也就五十身中初二十四身直就身體以顯身相二從不虗色身已下五身就身相差別以顯身義三一相色身已下十身據身用差別以明身義四從無所依色身已下十一身託利益差別以顯身義也又體相及用相非對棧故乃文中皆先明身體後顯離詮言道不及若論益也則迹亂塵中事在無恆故乃説家直辨身相不云絶言也就初段中初之五身明法身體相用二不染色身已下七身明報身體相用三無量形像色身已下十一身就應身體相用四不滅身一身明前三身離詮之義就總攝前身中一切衆生想者假無不照故成真想空無所有者明前五陰如醍醐之相色身成就者明空而是有故成非色之色義就智正覺世間中初牒前所見以顯正智益世之義二從行不可壞已下廣明智正覺身相三於一切世間已下總收前德成在惠為佛母之義就廣明中初明六度行成為集業之義二得淨法身已下明於法身三顯現無量已下辨於報身四一身充滿已下明應身亦具大悲者持戒也出生者忍辱也知一切已下禪定也分別了知已下般若也次三身之中亦應各具體相用也即變己身與摩耶等者明改本成末大用無殊故成教道行也五體投地者五種方便妙合有為也即得無量者統攝無外也從三昧起者更入大幻之法門也就第五自陳己懷中初一問答正明大幻行相差別第二問答明大幻之行位成近遠初云文殊教我者欲明終無別終由始而成終故也就答中初則總明德法與盧舍那為母二善男子已下明於菩薩來下受生故成母義三善男子彼妙光明來入我身已下明身亦不大而能廣苞故成幻義四善男子我為盧舍那佛母已下明一生一切生故成大幻義凡一生一切生生義應無限今且舉一百七十佛屬所生者也所言佛母者若別對三身則以三道真智內照圓滿出生大覺故名母也若論隨相義王宮生父母者則易解皆悉為母者猶一因一切因就答久近中亦初就一佛以明始修見道成立二則會通不二更奉多佛明修道亦備但此據學窮故偏言不可數劫斯則以本際不可知故則行亦不可知也正念天女者猶是智慧之別相也國名海澗薗林名大莊嚴藏彌勒菩薩四十二法性苞含勝出無礙名海澗國總發統攝行德斯聚名曰薗林萬寶交瑩出生無盡名大莊嚴藏夫言彌勒者此言慈氏蓋顯慈用自在地果畢竟故乃此位特寄其人以為知識也法門者或名大慈或名大悲或名菩提心或名受生或名入三世智正念思惟莊嚴藏此蓋隨義之通塞也就此文中初明善財蒙二童誨導起修進趣二偈後爾時已下明行已到三爾時善財頭面禮敬已下明到已設敬四白言已下明往復以陳來意五善男子汝今往詣文殊師利問已下明其慈氏高推有在又從實知問於一生義在稍難故乃特須忉利天上正念天女以為見聖之良媒若準上來亦應是知識之一門但無其説法故攝為慈氏之方便也者猶福德之差別也此童子者亦是助化之知識也又金剛心之與一生理非胡越故乃善財更無告辭之文也就起修進趣中初明二童陵虗誨讚令便速修二爾時善財聞如是等讚已下正明善財奉教而修行就前陵虗誨讚中初明二童加於善財令三業調順得不疲之力二又作是言已下正示高位令去心有標三汝詣彼問已下正勸善財速赴高位咨受生之法四善男子汝不應一善根已下勸捨劣心更崇勝想以顯良友見在不易五若見聞法恭敬供養已下勸捨輕心當作寶想以顯難遇六復次善男子善知識者則為慈母已下勸在法莫生人過之想以顯難遇若也總而束之則初二段明何所習近中間三段辨云何習近第六一門辨何故習近就示高位中一則示處謂國薗及樓三種土也二示其人謂彌勒是也就第三勸問受生法中初則直勸往參二何以故已下明有德故須參三善男子彼菩薩已下正舉前德能令行人入證具足故須參也就第四勸捨劣心中初舉善財已得十法勸令更修莫生足想二何以故已下舉法實多釋成勸意三是故已下結就釋中初六十無量明助道行法二修菩薩法已下證道行法三覺悟菩薩諸莊嚴行已下明不住道法四善男子略説已下明大用自在法就前六十句中初明自分行相二發起無量不壞信心已下明他分行相三淨修無量已下明二分行成滿足之義就自分中初明利他方便二修淨菩薩無量直心已下明自分利方便就他分中先明自利方便次發起無量法明已下明他利方便就第五勸莫生輕想中初則直勸莫輕二何以故已下明生善處多是故莫輕第二何以故已下明滅惡德具故勿輕也就第六當作師想中初十句明勸善財當於知識作除苦想二又善男子已下二十二句正勸善財作勇猛不退想三又善男子已下勸自念病重無得簡師得失想就無得簡師得失中初十句直勸勿簡二何以故已下三十句釋三善男子如是等已下八句結其善友全是行本故須莫簡也就第二善財奉教修行中初長行後偈頌就長行中初明善財聞讚心喜不倦心成二見諸如來已下明由心生解法無不照三爾時五體敬禮已下明依解興行重人敬處之義四又復等觀已下明由行成道謂見修等是也五爾時善財已下明得成在人則妙解圓備深知此處即是淨土智慧衆生往在其中故須敬也就淨土之中略有二門謂初明深達二際不同凡夫無為衆生往在其中二出過衆生為教化故而不捨離者已下明大用自在不同二乘有為衆生往在其中就重頌中有五十五偈頌前第五淨土之義就中初三十六偈明人淨故堂淨二佛子已下十七偈明堂淨故人淨末兩偈明結德歸人禮敬求護之義也就初人淨故堂淨中初十偈頌前不住有為人次二十五偈頌不住無為人末不離一坐處一偈明寂用無礙處所不居故乃安住及於住此二句之文皆不攝也就第四大段中初一問一述明善財心無越起要藉無際而生故師歎既周還遣善財問於文殊二爾時善財五體敬禮已下一問一述明其善財既不失本實則來合其時心具決然三善男子汝先所問已下正提前問開樓觀以廣酬四爾時善財白言此何法門已下兩問答明問名以求會實五善財白言從何所來已下兩問兩答明泯去久近以顯一生無一生相故無生而不生若總而束之還是三問答之別義謂初兩問兩述即是法體就第一述成中初則對衆以指述其能修二從善財汝今得最大利已下正喚善財明前所述是善財所有故宜自幸三爾時彌勒已下正推本友明勸善財知得自幸之由四爾時善財已下明於善財既蒙聖勸則解徵先原成行之義就對衆指述中初歎心因成立即序述行所徑歷遠近之義二如是童子學大乘者已下正述心因及起方便攝行義三從善男子世間有能發無上心者已下明其善財心行既然則實是希有難遇之高士也四從善男子若有菩薩如是學者已下歎其行成德齊普賢威儀同佛以成三千獨一之心也徑歷百一十知識者謂此四十通於十信即是五十然此五十之中各有方便自體二種法門以為學行及修二種境界即是一百知識也又摩耶慈氏位窮學頂力用自在故此二人各具五德念以二五之十配於前百即是一百十一知識夫知識頭數既然則所歷之城事亦同此就正喚善財明前所述是善財所有勸其自幸中初明得見根本知識聞法生道故須自幸第二汝今獲大善利已下明得見四十一知識故須自幸第三善財汝應已下正觀自幸之義過去諸佛不得此法者當是十住中便成正覺之佛也夫心力難思故今文殊嚮彼申臂以助供養之具然先際既攝則後際自來故慈氏當尊亦即以手而摩善財就第二問中初則舉出自疑二大聖今者已下正舉慈氏所行以為所問之法三唯願已下結請也就慈尊述成中初以偈讚顯於善財不捨本際道心圓備二偈後告善財言已下明於慈尊印前顯後廣明善財心本既具遂德無不集義就偈讚中初以偈頌二偈末少文明讚不虗讚有傍利之義就此六十八偈中初一偈總歎善財德備具足能來見我次十偈明善財得文殊之解故來合其宜三成就智慧網已下有十四偈明來心清淨故乃妙也四無比正直心已下二十六偈嘆於善財心因成立隨順文殊成自利利他行相之義五分別諸佛已下十一偈明勸善財已具上行宜當自幸之義末六偈總結其德明於善財豈直現益無崖若後之獲利復義亦無窮也此亦還頌前段之述文也就第二明善財心本既具法無不集中初略明心本具足值此良師道互茂為諸佛護持義二何以故已下廣明菩提之心力用廣大德無不建釋成善哉義三善男子汝得善利得阿耨多羅已下少文結屬其人以顯善義就第二廣釋中謂始於此唱終於三世諸佛成正覺故明心與理合根本成立生善具足義二善男子譬如有人得自在藥以下竟此段廣就喻門明心與行同體離自在成滅惡之義就前段生善中初一句對果以顯本立二為良田已下託末以廣辨三佛子菩提心者如是已下總結無窮實以此據其終欲攝行以歸普賢故乃廣辨其心以顯始終無二方得畢竟故也就廣辨中有一百一十五句謂始於初句終盡能滿菩薩諸大願故有十八句明自利行心解行道乘四心成也二者慈母已下有二十句明利他行也三白栴檀已下十七句明除煩惱鄣四利梨已下二十句明除智鄣五湧泉已下七句明煩惱盡故心解脫六網羅已下十七句明智鄣斷故慧解脫七琉璃寶已下十六句明德用自在緣無不攝出過二乘義何以故者何以心非是行而得萬用斯備與佛同故就第二段滅惡行中初則就九十之喻合以廣辨二末後少文結也凡九十喻者文自顯然不煩具指云爾就開樓觀以廣酬中初則總舉前問示其答門令善財行者入已悟實義二爾時善財已下明答門雖現而非友力不入故令彌勒彈指門即開也三善財即入已下明於善財蒙知識之加力得入樓觀之法界照周萬境無鄣無礙義四爾時彌勒攝神力已下明於善財解力未淳入無永入還住本位陳己所見對於彌勒以顯宿幸得於知識之力義還閇者猶得旨亡筌也就蒙知識之加力得入樓觀中初就樓觀為詮以見淨土法身義二爾時善財於寶鏡已下明於寶鏡為詮得見淨土法身義三又見寶柱中已下明託寶柱為詮得見淨土法身義四爾時彌勒告善財已下明見境真解相貌差別就初樓觀中從彌勒威神已下是法身也又聞樓觀者猶是法身之口業也就寶鏡中又見無量已下是法身也寶柱中法身者又樹中已下是也若直樓詮鏡柱樹及半月等以為觀境者則義亦通矣就見之相貌中初夢喻者境無境相中陰喻者報無報相三非人喻者知無知相四龍宮喻者時無時相五梵宮喻者現無現相六入定喻者亂無亂相七乾闥喻者礙無礙相八升無喻者相同乾城但已下觀實見為別九大海喻者容無容相十幻喻者用無用相就答第二問法名之中初一問答正問法名第二問此諸奇特從何所來者問此法名生起之由以顯此法非同相用也莊嚴藏法門者正答法名一生菩薩得者寄人以顯法位也龍王喻者明用從心起則知起在無始幻喻者明起無起相則知起在無終也就第三明久近問中初一問答明體實無來去隨化收來去第二問答正問隨化受生之相貌也就答初問中初問中初十句正明真性平等妙絶來去二從但為已下有七句明體雖平等而大悲勳心故有來也三汝所問我已下正就隨化處所以顯來相就前十句中無來住者始終不二無著者染淨不二不生死者生滅不二不住至者進退不二不離起者成壞不二不捨著者出沒不二無業報者因果不二無起無依者本末不二不常不斷者有無不二所言趣者蓋是途理之別名也就七句中初一是總餘六別也就其別中初一句明從助道而來次大願兩句明從不住道來次無增兩句明從證道而來末後一句明從身報而來身報者猶是三道畢竟也言汝所問我者猶似且置是事也就答第二問中初明真常法身來生之相二我於此閻浮提南界已下明方便之身上生下生令於文殊善財俱見之義也就前真常法身受生中初就十法明受生行位十法者猶十地行相也二善男子菩薩摩訶薩已下明生無獨生緣備方建三佛子如是菩薩超凡夫地已下明真生既建則妙出凡小清淨之義謂知一切法悉如電已下是過小之相也四善男子我淨法身已下明前法身既出過凡小則自在遍周一生一切生義就高推有在中若次第而言則事唯普賢菩薩以為知識然普賢之行非妙慧不達故須敕言汝往詣文殊師利亦似前示正念天女也文殊為佛母者謂大覺圓明從寶際而生即是般若波羅蜜為母也普門國普賢菩薩四十三一土一切土相別而無礙名曰普門國普賢之名備如前釋今此位者乃是不住大道圓滿畢竟若論所觀所入則更無異轍正還總前諸行以為此位之德故乃文中更無別法門之名也就此文中亦一辭退二退己行三到普門國已下明行已到四爾時普賢即申右手已下明其普賢以不説之説被化善財令得普賢無礙行德義又此位中若明善財則行窮滿足法從內顯故乃善財更無請問之辭若論普賢則位窮行標化唯是我故乃文末遂更無高推之名也就行已到中初明善財達到淨土次一心已下明見普賢法身之相就此見法身中初明牒前四十二行為他地方便二爾時善財正念已下十一心明於善財修自地方便三爾時善財起是心時已下明方便既具則兆狀先現四爾時善財見十種瑞相已下明尋瑞智備正見法身之義五爾時善財見普賢即得已下明於善財攝成己德以顯見者見不虗見之義也就前牒四十二行為他地方便中初明意業專淨得見諸知識二不違其教已下正明善財既見知識修起方便之義三善財童子得聞已下明方便行滿成地德之義就前第二句中初不違一句明教為行本次增長已下正明起修就此正明起修中初五句明於解相次具解脫道已下五句明於行相三明淨慧光已下四句明於道相四言修習者明解行及道三義既具則普賢之德亦滿足而不缺也夫言道相四句者謂明淨一以淨二壞邪三具足四也就方便行滿中初句是總餘十名別也具者猶信行法者猶前境得者是因義次第者增長義修者三種火也住者名地體也境界者是用也持名曰果也共則名同行正道謂地智此蓋總束諸地不過智行兩門收也就第三兆狀先現中初明牒前諸善為現瑞之因次即見已下正明所見瑞相差別十光者助顯瑞相體非正瑞故乃文中但云十瑞不云光也就第四正見法身中初明更起勝念為見身之本次即見已下正明所見就正明所見法身相中初十句明于身體次一一毛孔已下十九句明法身之相三重觀普賢一一身分已下明於法身用相亦備就普賢以不説之説被化善財中初明普賢身加以成化二普賢告言已下明於普賢口説以顯益就此口説中初長行後偈頌就長行中一則先定所見二我於過去已下明普賢菩薩自説往修今得滿足二身隨用自在之義三善男子且觀已下廣明己德益利無崖勸於善財以無聞聞修入法身義四爾時善財於普賢已下正明善財依教修行證同普賢義五爾時善財徑由已下明挍量以顯德具六爾時善財能自究竟已下明德成在人自在無礙法身成滿當齊大覺以顯善財備徑衆苦歷遊多城求友獲益不虗之義十三等者初句是總餘十二名別就重頌九十九偈中初八偈誡敕善聽總嘆佛德勸於行者生樂之義次諸佛已下八十九偈明廣嘆佛德具足之義末後二偈結顯無窮勸信生益與佛不二義就廣嘆八十九偈中初三偈嘆於如來法身具足次或見如來已下三十五偈半嘆於如來方便身具隨用自在萬變無恆義三無礙清淨慧已下二十二偈半明於請佛依方便之身起三業善巧義佛口者是意業之用也四雖復隨世現已下十四偈明三業隨智慧行義五譬如上幻師已下十四偈半明三業成用無鄣無礙義若據法説此名喻説者則義亦無嫌斯等諸偈廣舉佛德以嘆具足者蓋顯善財修行滿足圓通自在無鄣無礙功齊大覺故也若據普賢以説即明普賢之道與佛無殊故乃位相標標在知識之上首然矣又此教者蓋是了義真唱備顯法界本末相資義無缺少故乃會會所明皆悉首尾之義具足無減是故此末但明説偈勸信成現辰之益更無別流通之辭句也又汝法界真法體是緣起自在真軌隨緣隨境普遍心塵冥覺萇益利常然故乃教終遂全無勸付之文也天保十年沙門靈裕在寶山寺集記鸞供養
