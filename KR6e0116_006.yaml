  - {type: 其他, offset: 10466, content: 此佛眾中夜天名開敷樹華第三十七, id: KR6e0116_X_006-mulu-28, level: '1'}
  - {type: 其他, offset: 11756, content: 於此道場有夜天名願勇光明守護眾生第三十八, id: KR6e0116_X_006-mulu-29, level: '1'}
  - {type: 其他, offset: 13225, content: 此閻浮提有薗林名流彌尼有夜無名妙德圓滿三十九, id: KR6e0116_X_006-mulu-30, level: '1'}
  - {type: 其他, offset: 14522, content: 迦毗羅城有釋迦女名瞿夷四十, id: KR6e0116_X_006-mulu-31, level: '1'}
  - {type: 其他, offset: 15752, content: 此迦毗羅城摩耶夫人四十一, id: KR6e0116_X_006-mulu-32, level: '1'}
  - {type: 其他, offset: 17308, content: 國名海㵎薗林名大莊嚴藏彌勒菩薩四十二, id: KR6e0116_X_006-mulu-33, level: '1'}
  - {type: 其他, offset: 20896, content: 普門國普賢菩薩四十三, id: KR6e0116_X_006-mulu-34, level: '1'}
  - {type: 'cbeta:juan-end', offset: 22222, content: 華嚴文義記卷之六, id: KR6e0116_X_006-juan-end, juan_n: '006', jhead: 華嚴文義記卷之六}
